app:
  name: il
  selected_training: ${hydra:runtime.choices.training@_global_}_${run_mode}
  log_root: log

hydra:
  run:
    dir: ${app.log_root}/${app.name}_${app.selected_training}_${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ${app.log_root}/${app.name}_${app.selected_training}_${now:%Y%m%d_%H%M%S}
    subdir: ${hydra.job.num}

defaults:
  # train_traj_mlp, train_traj_diffusion, close_eval_traj_mlp
  - training@: train_traj_diffusion
  - _self_

# train, validate, test, close_eval
run_mode: train

