
defaults:
  - /trainer@trainflow.trainer: default
  - /model@trainflow.model: traj_diffusers_trainable_model
  - _self_


close_eval:
  _target_: il.eval.close_eval_diffusers.CloseEvalDf

run_mode: close_eval
auto_load_checkpoint: false
resume_checkpoint: log/il_train_traj_diffusion_train_20260516_151351/checkpoint/final.ckpt
strict: true
weights_only: false

trainflow:
  data:
    data_set:
      use_local_coords: true
      history_interval: 2
      future_interval: 2
      num_lane_dividers: 2

  controller:
    horizon: 15
    dt: 0.1

  env:
    dt: 0.1
    max_steps: 10000
    init_speed: 5.0
    init_lateral_offset: 0.0
    init_heading_offset: 0.0

    road_points_ahead: 80
    include_road_obs: true

    render_mode: human
    auto_render: false
    render_fps: 30
  
    render_width: 2000
    render_height: 1600
    render_scale: 10.0
    
    save_video: true
    video_path: null  # None 时每个 reset 在 video_dir 下自动生成
    video_dir: "videos"

    random_init: true
    random_config:
      random_init_speed_range: [0.0, 10.0]
      random_init_lateral_offset_range: [-1.5, 1.5]
      random_init_heading_offset_range: [-0.2, 0.2]
      random_target_speed_range: [0.0, 10.0]

    max_lateral_offset: 10
    reward_config:
      weights:
        lane_keeping: 10.0
        speed_tracking: 10.0
        heading_error: 0.0
        action_penalty: 5.0
        off_road_penalty: 10.0
      target_speed: 15.0

    road_config:
      lane_width: 3.5
      num_lanes: 3
      points_per_meter: 1.0
      fixed_segments: null
      loop_segments: true
      num_random_segments: 5
      segment_weights:
        STRAIGHT: 3.0
        CURVE: 5.0
        INTERSECTION: 0.0
        SPLIT: 0.0
        MERGE: 0.0
      straight_length_range: [20.0, 80.0]
      curve_radius_range: [5.0, 80.0]
      curve_angle_range: [20.0, 180.0]
      intersection_size_range: [10.0, 20.0]
      split_merge_length_range: [15.0, 40.0]
      split_merge_angle_range: [10.0, 30.0]
