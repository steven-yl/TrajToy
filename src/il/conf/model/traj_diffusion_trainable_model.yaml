defaults:
  - /modules/model@predictor.model: conditional_UNet1D_model
  - _self_


_target_: il.model.traj_diffusion_trainable_model.TrajDiffusionTrainableModel
_convert_: all

# Optimizer & LR scheduler（TrainFlow 在每个 optimizer step 调用 scheduler.step()，步数均指更新步）。
lr: 1.0e-3
weight_decay: 1.0e-4
# none | cosine | cosine_warmup（Linear warmup → Cosine）| step
lr_scheduler: cosine_warmup
cosine_t_max: 40000
cosine_eta_min: 1.0e-5
# cosine_warmup：warmup 步数；warmup 期内 lr 从 lr×warmup_start_factor 线性升到 lr。
warmup_steps: 500
warmup_start_factor: 1.0e-8
# step：每隔 lr_step_size 步乘以 lr_gamma。
lr_step_size: 30
lr_gamma: 0.5

# TrajDiffusionModelWrapper + ConditionalUNet1D（与 conditional_UNet1D_model.yaml 参数对齐）。
predictor:
  _target_: il.model.traj_diffusion_trainable_model.TrajDiffusionModelWrapper
  diffusion_schedule: linear
  diffusion_steps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2

  # predictor.model：由 defaults 中的 modules/model/conditional_UNet1D_model.yaml 注入；此处可写覆盖项。
  model: 
    history_len: 5
    future_len: 25
    road_points: 60

  # TrajLoss configuration.
  loss_fn:
    _target_: il.modules.loss.traj_loss.TrajLoss
    cfg_ade_weight: 1.0
    cfg_fde_weight: 1.0

  # TrajMetrics configuration.
  metrics_fn:
    _target_: il.modules.metrics.traj_metrics.TrajMetrics
    lon_fde_thresholds_m: [5.0, 15.0]

