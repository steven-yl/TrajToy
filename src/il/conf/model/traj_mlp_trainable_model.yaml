defaults:
  - /modules/model@predictor: traj_mlp_model
  - _self_

_target_: il.model.traj_mlp_trainable_model.TrajMlpTrainableModel
_convert_: all

# TrajMlp trajectory predictor configuration (overrides on top of /modules/model/traj_mlp_model).
predictor:
  history_len: 5
  future_len: 25
  road_points: 60

# TrajLoss configuration.
loss_fn:
  _target_: il.modules.loss.traj_loss.TrajLoss
  cfg_ade_weight: 1.0
  cfg_fde_weight: 1.0

# TrajMetrics configuration.
metrics_fn:
  _target_: il.modules.metrics.traj_metrics.TrajMetrics
  lon_fde_thresholds_m: [5.0, 15.0]

# Optimizer & LR scheduler（TrainFlow 在每个 optimizer step 调用 scheduler.step()，步数均指更新步）。
lr: 1.0e-3
weight_decay: 1.0e-4
# none | cosine | cosine_warmup（Linear warmup → Cosine）| step
lr_scheduler: cosine_warmup
cosine_t_max: 40000
cosine_eta_min: 1.0e-5
# cosine_warmup：warmup 步数；warmup 期内 lr 从 lr×warmup_start_factor 线性升到 lr。
warmup_steps: 500
warmup_start_factor: 1.0e-8
# step：每隔 lr_step_size 步乘以 lr_gamma。
lr_step_size: 30
lr_gamma: 0.5