app:
  name: il
  selected_training: ${hydra:runtime.choices.training@_global_}_${run_mode}
  log_root: log
  run_id: ${oc.env:RUN_ID,${now:%Y%m%d_%H%M%S}}

hydra:
  run:
    dir: ${app.log_root}/${app.name}_${app.selected_training}_${app.run_id}
  sweep:
    dir: ${app.log_root}/${app.name}_multirun_runs_${app.run_id}
    subdir: ${hydra.job.num}

defaults:
  # train_traj_mlp, train_traj_diffusion
  - training@: train_traj_diffusion
  - override hydra/job_logging: custom   # 覆盖 Hydra 内置的 job_logging，避免 Multiple values
  - _self_

# train, validate, test, close_eval
run_mode: train

# 固定随机种子以保证可复现（权重初始化 / 数据增强 / 扩散加噪与采样）。
seed: 42

# auto_load_checkpoint: true
# strict: true
# weights_only: true
# resume_checkpoint: log/il_train_traj_diffusion_train_20260608_150613/checkpoint/final.ckpt
msg: null