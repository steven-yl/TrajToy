defaults:
  - /eval: default
  - /data: default
  - /model: mlp
  - /loss: mse
  - /log: default
  - _self_

device: cuda

trainer:
  _target_: il.training.mlp_train.MLPTrainer
  _convert_: "all"
  checkpoint_path: null

  num_epochs: 100
  learning_rate: 1e-3
  weight_decay: 1e-4
  lr_scheduler: cosine
  lr_step_size: 30
  lr_gamma: 0.5
  warmup_steps: 500
  max_grad_norm: 1.0
  