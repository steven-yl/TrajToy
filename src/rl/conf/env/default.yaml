dt: 0.1
max_steps: 10000
init_speed: 5.0
init_lateral_offset: 0.0
init_heading_offset: 0.0

road_points_ahead: 20
include_road_obs: true

render_mode: null
auto_render: false
render_fps: 30

# 随机初始化（开启后在范围内随机采样，覆盖上面的固定值）
random_init: true
random_config:
  random_init_speed_range: [0.0, 10.0]
  random_init_lateral_offset_range: [-1.5, 1.5]
  random_init_heading_offset_range: [-0.2, 0.2]
  random_target_speed_range: [0.0, 10.0]

reward_config:
  weights:
    lane_keeping: 10.0
    speed_tracking: 10.0
    heading_error: 0.0
    action_penalty: 5.0
    off_road_penalty: 10.0
  target_speed: 5.0

road_config:
  lane_width: 3.5
  num_lanes: 1
  points_per_meter: 1.0
  fixed_segments: null
  loop_segments: true
  num_random_segments: 3
  segment_weights:
    STRAIGHT: 7.0
    CURVE: 3.0
    INTERSECTION: 0.0
    SPLIT: 0.0
    MERGE: 0.0
  straight_length_range: [20.0, 80.0]
  curve_radius_range: [5.0, 80.0]
  curve_angle_range: [20.0, 180.0]
  intersection_size_range: [10.0, 20.0]
  split_merge_length_range: [15.0, 40.0]
  split_merge_angle_range: [10.0, 30.0]

